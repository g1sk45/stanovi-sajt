name: Update Booking Data

on:
  schedule:
    # Svakog ponedeljka u 7:00 UTC (9:00 po našem vremenu)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Omogućava i ručno pokretanje iz GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/update_booking.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking-data.json
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: update Booking.com data [skip ci]"
          git push
